<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MovieHub | Category View</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; padding: 20px; position: relative; }
        
        /* Home Button Style */
        .home-nav { margin-bottom: 20px; }
        .home-nav a { color: #ffd700; text-decoration: none; font-weight: bold; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 8px; }
        .home-nav a:hover { color: #white; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        
        /* Fixed layout sizes to prevent shifts while images load */
        .grid img { width: 100%; height: 240px; border-radius: 6px; cursor: pointer; object-fit: cover; background-color: #111; display: block; }
        
        /* Back to Top Arrow */
        #back-to-top { position: fixed; bottom: 20px; right: 20px; background: #ffd700; padding: 10px 15px; border-radius: 50%; cursor: pointer; color: black; display: none; z-index: 999; }
    </style>
</head>
<body>

    <!-- Home Navigation Link -->
    <div class="home-nav">
        <a href="index.html"><i class="fas fa-home"></i> HOME</a>
    </div>

    <h1 id="cat-title">Loading...</h1>
    <div class="grid" id="movie-grid"></div>

    <!-- Back to Top Button Component -->
    <div id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script>
        async function loadCategory() {
            const params = new URLSearchParams(window.location.search);
            const keyword = params.get('q');
            
            // Fix the title mismatch from image_45ecfc.jpg
            if (keyword === 'Comedy') {
                document.getElementById('cat-title').innerText = "Comedy, Romance & Fantasy Collection";
            } else {
                document.getElementById('cat-title').innerText = keyword + " Collection";
            }

            const response = await fetch('data/all-movies.json');
            const movies = await response.json();

            const filtered = movies.filter(m => 
                (m.title && m.title.includes(keyword)) || 
                (m.genres && m.genres.includes(keyword))
            );

            const grid = document.getElementById('movie-grid');
            grid.innerHTML = '';
            
            // Render images with blank placeholder sources first to force true lazy-loading execution
            filtered.forEach(m => {
                grid.innerHTML += `<img data-src="${m.posterUrl}" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='240' viewBox='0 0 160 240'></svg>" alt="${m.title}" onclick="window.location.href='movie-details.html?id=${m.id}'">`;
            });

            // True Lazy Loading Intersector: Only downloads image bytes when scrolled into view
            const lazyImages = [].slice.call(document.querySelectorAll("#movie-grid img"));
            if ("IntersectionObserver" in window) {
                let lazyImageObserver = new IntersectionObserver(function(entries, observer) {
                    entries.forEach(function(entry) {
                        if (entry.isIntersecting) {
                            let lazyImage = entry.target;
                            lazyImage.src = lazyImage.dataset.src;
                            lazyImageObserver.unobserve(lazyImage);
                        }
                    });
                });

                lazyImages.forEach(function(lazyImage) {
                    lazyImageObserver.observe(lazyImage);
                });
            } else {
                // Fallback for primitive setups
                lazyImages.forEach(function(lazyImage) {
                    lazyImage.src = lazyImage.dataset.src;
                });
            }
        }

        // Show/Hide back-to-top arrow based on layout scroll depth
        window.addEventListener('scroll', () => {
            const btt = document.getElementById('back-to-top');
            if (window.scrollY > 300) {
                btt.style.display = 'block';
            } else {
                btt.style.display = 'none';
            }
        });

        loadCategory();
    </script>
</body>
</html>
