<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MovieHub | Premium Vault</title>
    <meta name="description" content="Stream hundreds of fully restored Hollywood cinema classics, 1940s-1970s westerns, vintage film noir, rare horror, and classic British comedies completely free.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0a0a0a; color: white; font-family: sans-serif; margin: 0; }
        header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid #e50914; }
        .nav-links a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }
        
        /* Search Bar Wrapper */
        .search-row { text-align: center; padding: 20px; }
        .search-wrapper { position: relative; display: inline-block; width: 320px; }
        #search-input { padding: 10px 40px 10px 12px; width: 100%; border-radius: 5px; border: none; box-sizing: border-box; }
        
        /* Clear Button Style */
        .clear-btn { 
            position: absolute; 
            right: 12px; 
            top: 50%; 
            transform: translateY(-50%); 
            background: none; 
            border: none; 
            color: #666; 
            cursor: pointer; 
            font-size: 1.1rem; 
            display: none; 
            padding: 0;
        }
        .clear-btn:hover { color: #e50914; }

        /* Shelves */
        .shelf { margin: 40px 20px; min-height: 310px; } 
        .shelf h2 { color: #ffd700; border-left: 4px solid #e50914; padding-left: 10px; }
        .shelf-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 20px; min-height: 240px; }
        .shelf-grid img { width: 160px; height: 240px; border-radius: 6px; object-fit: cover; cursor: pointer; background-color: #111; display: block; }

        /* Footer & Icons */
        footer { background: #111; padding: 40px; text-align: center; border-top: 1px solid #333; margin-top: 50px; }
        .footer-icons { font-size: 1.5rem; margin: 15px 0; }
        .footer-icons a { color: #ffd700; margin: 0 10px; }
        #back-to-top { position: fixed; bottom: 20px; right: 20px; background: #ffd700; padding: 10px 15px; border-radius: 50%; cursor: pointer; color: black; display: none; z-index: 999; }
    </style>
</head>
<body>

    <header>
        <h1>MOVIEHUB VAULT</h1>
        <nav class="nav-links">
            <a href="index.html">HOME</a>
            <a href="catalog.html">ALL MOVIES</a>
            <a href="membership.html">MEMBERSHIP</a>
            <a href="login.html" style="color:#ffd700; font-weight:bold;">MEMBERS ENTER HERE</a>
        </nav>
    </header>

    <div class="search-row">
        <div class="search-wrapper">
            <input type="text" id="search-input" placeholder="Search the vault...">
            <button id="clear-search" class="clear-btn" title="Clear search"><i class="fas fa-times-circle"></i></button>
        </div>
    </div>

    <div id="shelf-container"></div>

    <footer>
        <div class="footer-icons">
            <a href="#"><i class="fas fa-hat-cowboy"></i></a>
            <a href="#"><i class="fas fa-ghost"></i></a>
            <a href="#"><i class="fas fa-fist-raised"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
            <a href="#"><i class="fab fa-pinterest"></i></a>
            <a href="#"><i class="fas fa-envelope"></i></a>
        </div>

        <div style="margin: 20px 0;">
            <a href="https://buymeacoffee.com/moviehubhd" style="background:#ffd700; color:black; padding:10px 20px; text-decoration:none; border-radius:5px; font-weight:bold;">
                <i class="fas fa-coffee"></i> Buy me a coffee
            </a>
        </div>

        <p>&copy; 2026 MovieHub. All rights reserved.</p>
        <p>Hand-curated in Thailand | Subsidizing the Pension Fund</p>
    </footer>

    <div id="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <i class="fas fa-arrow-up"></i>
    </div>

    <script>
        let allMoviesData = []; 

        async function init() {
            try {
                const cachedData = sessionStorage.getItem('movieHubDatabase');
                if (cachedData) {
                    allMoviesData = JSON.parse(cachedData);
                } else {
                    const response = await fetch('data/all-movies.json');
                    allMoviesData = await response.json();
                    sessionStorage.setItem('movieHubDatabase', JSON.stringify(allMoviesData));
                }
            } catch (error) {
                const response = await fetch('data/all-movies.json');
                allMoviesData = await response.json();
            }

            renderShelves(allMoviesData);
            
            const searchInput = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');

            searchInput.addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                if (term.length > 0) {
                    clearBtn.style.display = 'block';
                    const filtered = allMoviesData.filter(m => m.title.toLowerCase().includes(term));
                    renderShelves(filtered, true); 
                } else {
                    clearBtn.style.display = 'none';
                    renderShelves(allMoviesData, false);
                }
            });

            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                searchInput.focus();
                renderShelves(allMoviesData, false); 
            });
        }

        function renderShelves(movies, isSearch = false) {
            const container = document.getElementById('shelf-container');
            container.innerHTML = '';
            
            if (isSearch) {
                container.innerHTML = `<section class="shelf"><h2>Search Results</h2><div class="shelf-grid" id="search-grid"></div></section>`;
                const grid = document.getElementById('search-grid');
                movies.forEach(m => {
                    grid.innerHTML += `<img src="${m.posterUrl}" alt="${m.title}" loading="lazy" onclick="window.location.href='movie-details.html?id=${m.id}'">`;
                });
            } else {
                const categories = [
                    { title: "Latest Releases", keyword: "New", domId: "latest" },
                    { title: "Westerns", keyword: "Western", domId: "western" },
                    { title: "Horror & Thriller Vault", keyword: "Horror", domId: "horror" },
                    { title: "Action Collection", keyword: "Action", domId: "action" },
                    { title: "Classic Movies", keyword: "Classics", domId: "classics" },
                    { title: "Comedy, Romance & Fantasy", keyword: "Comedy", domId: "comedy" },
                    { title: "Bette Davis Collection", keyword: "Bette Davis", domId: "bettedavis" },
                    { title: "Hitchcock Collection", keyword: "Hitchcock", domId: "hitchcock" }
                ];

                categories.forEach(cat => {
                    const filtered = movies.filter(m => 
                        (m.title && m.title.includes(cat.keyword)) || 
                        (m.genres && m.genres.includes(cat.keyword))
                    );
                    
                    if (filtered.length === 0) return;
                    
                    const section = document.createElement('section');
                    section.className = 'shelf';
                    
                    section.innerHTML = `
                        <div style="display:flex; justify-content:space-between; align-items:baseline;">
                            <h2>${cat.title}</h2>
                            <a href="category.html?q=${cat.keyword}" style="color:#e50914; text-decoration:none; font-weight:bold; margin-right:20px;">VIEW ALL ></a>
                        </div>
                        <div class="shelf-grid" id="grid-${cat.domId}"></div>
                    `;
                    container.appendChild(section);
                    
                    const grid = document.getElementById(`grid-${cat.domId}`);
                    const homepageLimit = filtered.slice(0, 6);

                    if ("IntersectionObserver" in window) {
                        let shelfObserver = new IntersectionObserver(function(entries, observer) {
                            entries.forEach(function(entry) {
                                if (entry.isIntersecting) {
                                    // High-performance DOM construction using memory fragments
                                    const fragment = document.createDocumentFragment();
                                    
                                    homepageLimit.forEach(m => {
                                        const img = document.createElement('img');
                                        img.src = m.posterUrl;
                                        img.alt = m.title;
                                        img.loading = "lazy";
                                        img.onclick = () => {
                                            window.location.href = `movie-details.html?id=${m.id}`;
                                        };
                                        fragment.appendChild(img);
                                    });
                                    
                                    // Injects the shelf items instantly in a single paint operation
                                    grid.appendChild(fragment);
                                    shelfObserver.unobserve(entry.target);
                                }
                            });
                        }, { rootMargin: "0px 0px 400px 0px" });
                        
                        shelfObserver.observe(grid);
                    } else {
                        const fragment = document.createDocumentFragment();
                        homepageLimit.forEach(m => {
                            const img = document.createElement('img');
                            img.src = m.posterUrl;
                            img.alt = m.title;
                            img.loading = "lazy";
                            img.onclick = () => {
                                window.location.href = `movie-details.html?id=${m.id}`;
                            };
                            fragment.appendChild(img);
                        });
                        grid.appendChild(fragment);
                    }
                });
            }
        }

        window.addEventListener('scroll', () => {
            const btt = document.getElementById('back-to-top');
            if (window.scrollY > 300) {
                btt.style.display = 'block';
            } else {
                btt.style.display = 'none';
            }
        });

        init();
    </script>
</body>
</html>
