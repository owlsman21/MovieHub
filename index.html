<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WY3DHDXQWH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WY3DHDXQWH');
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>MovieHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Top Design Styles */
        body {
            display: block;
            margin: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        .main-header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
            border-bottom: 1px solid #333;
        }

        .main-header h2 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-header h2 span {
            color: #e50914;
        }

        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .search-container {
            width: 100%;
        }

        #search-input, .genre-select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #search-input:focus, .genre-select:focus {
            border-color: #e50914;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .nav-buttons a {
            color: #bbb;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-buttons a:hover {
            color: #fff;
        }

        .content {
            padding: 20px;
        }

        /* Movie Grid Styling */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        /* Specific grid for Latest Releases to ensure a clean layout for 24 movies */
        #latest-releases-grid {
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        }

        .movie-card {
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            text-align: center;
            transition: transform 0.2s;
        }

        .movie-card:hover {
            transform: translateY(-5px);
        }

        .movie-card img {
            width: 100%;
            height: 225px;
            object-fit: cover;
            display: block;
        }

        .movie-card h3 {
            font-size: 0.9rem;
            margin: 10px 5px;
            color: white;
        }

        .movie-card a {
            text-decoration: none;
            color: inherit;
        }

        h2.section-title {
            font-size: 1.8rem;
            border-left: 4px solid #e50914;
            padding-left: 15px;
            margin-top: 20px;
        }

        hr {
            border: 0;
            border-top: 1px solid #333;
            margin: 40px 0;
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h2>Movie<span>Hub</span></h2>

        <div class="controls-container">
            <div class="nav-buttons">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="catalog.html"><i class="fas fa-film"></i> All Movies</a>
            </div>

            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search the Vault...">
            </div>

            <select class="genre-select" onchange="location = this.value;">
                <option value="">Filter by Genre</option>
                <option value="catalog.html?genre=Action">Action</option>
                <option value="catalog.html?genre=Thriller">Thriller</option>
                <option value="catalog.html?genre=Drama">Drama</option>
                <option value="catalog.html?genre=Hitchcock">Hitchcock</option>
                <option value="catalog.html?genre=Horror">Horror</option>
                <option value="catalog.html?genre=Sci-Fi">Sci-Fi</option>
                <option value="catalog.html?genre=Musical">Musical</option>
                <option value="catalog.html?genre=History">History</option>
                <option value="catalog.html?genre=Western">Western</option>
            </select>
        </div>
    </header>

    <main class="content">
        <section id="homepage-search-section">
            <h2 class="section-title">Search Results</h2>
            <div id="homepage-search-results" class="movie-grid"></div>
        </section>

        <section>
            <h2 class="section-title">New Additions</h2>
            <div id="latest-grid" class="movie-grid"></div>
        </section>

        <hr>

        <section>
            <h2 class="section-title">Latest Releases</h2>
            <div id="latest-releases-grid" class="movie-grid">
                </div>
        </section>

        <hr>

        <section>
            <h2 class="section-title">Hitchcock Collection</h2>
            <div id="hitchcock-grid" class="movie-grid"></div>
            <div style="text-align: center; margin-bottom: 40px;">
                <a href="catalog.html?genre=Hitchcock" class="nav-buttons" style="display: inline-block; color: #e50914; font-weight: bold;">
                    SEARCH THE HITCHCOCK COLLECTION IN THE VAULT
                </a>
            </div>
        </section>
    <section id="contact-us" class="content-section" style="padding: 40px 0; background-color: #2a2a4a; margin-top: 20px; border-radius: 8px;">
    <h2 class="section-title" style="color: #ffd700; text-align: center; font-size: 2.5em;">Join the MovieHub</h2>
    

    <form action="https://formspree.io/f/xqabalea" method="POST" style="max-width: 32rem; margin: 2rem auto; background-color: #3a3a5e; padding: 1.5rem; border-radius: 0.5rem;">
        
        <input type="hidden" name="_next" value="https://moviehub.uk">
        
        <label for="name" style="display: block; color: #e0e0e0; font-weight: bold; margin-bottom: 0.5rem;">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required style="width: 100%; padding: 0.5rem; margin-bottom: 1rem; border-radius: 4px;">

        <label for="email" style="display: block; color: #e0e0e0; font-weight: bold; margin-bottom: 0.5rem;">Email:</label>
        <input type="email" id="email" name="email" placeholder="your.email@example.com" required style="width: 100%; padding: 0.5rem; margin-bottom: 1rem; border-radius: 4px;">

        <label for="message" style="display: block; color: #e0e0e0; font-weight: bold; margin-bottom: 0.5rem;">Movie Request / Message:</label>
        <textarea id="message" name="message" rows="5" placeholder="Tell us which movie you want to see in the vault..." required style="width: 100%; padding: 0.5rem; margin-bottom: 1rem; border-radius: 4px;"></textarea>

        <input type="text" name="_gotcha" style="display:none">

        <button type="submit" style="background-color: #735bf2; color: #fff; font-weight: bold; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; width: 100%; cursor: pointer;">Join the Vault</button>
    </form>
</section>

        <hr>

        <section>
            <h2 class="section-title">Asian Movies</h2>
            <div id="asian-grid" class="movie-grid"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
