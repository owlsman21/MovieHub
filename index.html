<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>MovieHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* New Top Design Styles */
        body {
            display: block; /* Removes sidebar layout */
            margin: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
        }

        .main-header {
            text-align: center;
            padding: 30px 20px;
            background: linear-gradient(180deg, #1a1a1a 0%, #111 100%);
            border-bottom: 1px solid #333;
        }

        .main-header h2 {
            font-size: 3rem;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .main-header h2 span {
            color: #e50914; /* Red accent */
        }

        /* Portrait Search & Genre Stack */
        .controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .search-container {
            width: 100%;
        }

        #search-input, .genre-select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #222;
            color: white;
            font-size: 1rem;
            outline: none;
        }

        #search-input:focus, .genre-select:focus {
            border-color: #e50914;
        }

        .nav-buttons {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .nav-buttons a {
            color: #bbb;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-buttons a:hover {
            color: #fff;
        }

        .content {
            padding: 20px;
            margin-left: 0; /* Ensures content isn't pushed by old sidebar */
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h2>Movie<span>Hub</span></h2>
        
        <div class="controls-container">
            <div class="nav-buttons">
                <a href="index.html"><i class="fas fa-home"></i> Home</a>
                <a href="catalog.html"><i class="fas fa-film"></i> All Movies</a>
            </div>

            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search the Vault...">
            </div>

            <select class="genre-select" onchange="location = this.value;">
                <option value="">Filter by Genre</option>
                <option value="catalog.html?genre=Action">Action</option>
                <option value="catalog.html?genre=Thriller">Thriller</option>
                <option value="catalog.html?genre=Drama">Drama</option>
                <option value="catalog.html?genre=Hitchcock">Hitchcock</option>
                <option value="catalog.html?genre=Horror">Horror</option>
                <option value="catalog.html?genre=Sci-Fi">Sci-Fi</option>
                <option value="catalog.html?genre=Musical">Musical</option>
                <option value="catalog.html?genre=History">History</option>
            </select>
        </div>
    </header>

    <main class="content">
        <div id="movie-grid-container" class="movie-grid"></div>
    </main>

    <script src="app.js"></script>
</body>
</html>
