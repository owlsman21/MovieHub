<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MovieHub Vault | Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><h2>Movie<span>Hub</span></h2></div>
        <div class="search-box">
            <input type="text" id="movieSearch" placeholder="Explore the Vault..." onkeyup="searchVault()">
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="horror.html"><i class="fa-solid fa-ghost"></i> Horror</a></li>
<li><a href="sci-fi.html"><i class="fa-solid fa-rocket"></i> Sci-Fi</a></li>
            <li><a href="test-western.html"><i class="fa-solid fa-hat-cowboy"></i> Westerns</a></li>
            <li><a href="action.html"><i class="fa-solid fa-gun"></i> Action</a></li>
            <li><a href="classics.html"><i class="fa-solid fa-clapperboard"></i> Classics</a></li>
            <li><a href="comedy.html"><i class="fa-solid fa-face-laugh-squint"></i> Comedy</a></li>
        </ul>
    </nav>

    <main class="content">
        <header>
            <h1>Unlock the Cinema Vault</h1>
            <p>Your gateway to timeless classics and blockbuster action.</p>
        </header>

        <section id="latest-section">
            <h3>Recently Added to the Vault</h3>
            <div id="latest-grid" class="movie-grid"></div>
        </section>

        <hr style="border: 0; border-top: 1px solid #333; margin: 40px 0;">

        <section id="hitchcock-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3>The Master of Suspense: Hitchcock</h3>
                <button class="vault-btn" onclick="quickSearch('Hitchcock')">DISCOVER HITCHCOCK</button>
            </div>
            <div id="hitchcock-grid" class="movie-grid"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
