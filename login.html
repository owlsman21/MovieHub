<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Login | MovieHub.uk</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0a0a0a; color: #fff; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #161625; padding: 40px; border-radius: 15px; border: 1px solid #ffd700; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        h2 { color: #ffd700; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        .btn-login { background: linear-gradient(135deg, #ffd700 0%, #b8860b 100%); color: #000; font-weight: bold; padding: 15px; border: none; border-radius: 5px; width: 100%; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-login:hover { transform: scale(1.02); filter: brightness(1.1); }
        .back-link { display: block; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #ffd700; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Members Vault</h2>
    <p>Please enter your access code</p>
    <input type="password" id="memberPass" placeholder="Enter Code">
    <button class="btn-login" onclick="validateAccess()">Enter Vault</button>
    <a href="index.html" class="back-link">← Back to MovieHub.uk</a>
</div>

<script>
    function validateAccess() {
        var pass = document.getElementById("memberPass").value;
        // You can change "MovieHub2026" to any code you want
        if (pass === "MovieHub2026") { 
            window.location.href = "members-vault.html"; 
        } else {
            alert("Incorrect code. Please check your founding member email!");
        }
    }
</script>

</body>
</html>
