<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WY3DHDXQWH"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WY3DHDXQWH');
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Watch classic movies on MovieHub.">
    <link id="canonical-link" rel="canonical" href="https://moviehub.uk/movie-details.html" />

    <title>MovieHub - Loading...</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        #wrapper { position: relative; width: 100%; max-width: 850px; margin: 0 auto; background: #000; aspect-ratio: 16 / 9; overflow: hidden; }
        #movie-iframe { width: 100%; height: 100%; border: none; }
        #mega-shield { position: absolute; top: 0; right: 0; width: 25%; height: 20%; z-index: 10; background: transparent; cursor: default; display: none; }
        .related-section { margin-top: 40px; padding: 20px; }
        .related-grid { display: flex; gap: 15px; flex-wrap: wrap; }
        .related-grid a img { width: 150px; border-radius: 8px; transition: 0.3s; }
        .related-grid a img:hover { transform: scale(1.05); }
    </style>
</head>
<body>

    <header class="main-header">
        <h2>Movie<span>Hub</span></h2>
        <div class="nav-buttons">
            <a href="index.html"><i class="fas fa-home"></i> Home</a>
            <a href="catalog.html"><i class="fas fa-film"></i> All Movies</a>
        </div>
    </header>

    <main class="content">
        <div id="wrapper">
            <div id="mega-shield"></div>
            <iframe id="movie-iframe" src="" allowfullscreen allow="autoplay; encrypted-media"></iframe>
        </div>

        <div class="movie-info-block" style="margin-top:20px; background:#1a1a1a; padding:20px; border-radius:8px;">
            <h1 id="movie-title">MovieHub Digital Vault</h1>
            <p id="movie-meta" style="color:#e50914; font-weight:bold; margin: 10px 0;">Loading...</p>
            <p id="movie-desc" style="line-height:1.6; color:#ccc;"></p>
        </div>

        <div class="related-section">
            <h3>You Might Also Like</h3>
            <div id="related-grid" class="related-grid"></div>
        </div>
    </main>

    <script>
        async function loadMovieDetails() {
            const params = new URLSearchParams(window.location.search);
            const movieId = params.get('id');
            if (!movieId) return;

            document.getElementById('canonical-link').setAttribute('href', window.location.href);

            try {
                const response = await fetch('data/all-movies.json');
                const movies = await response.json();
                const movie = movies.find(m => m.id === movieId);
                
                if (movie) {
                    const cleanTitle = movie.title ? movie.title.split('|')[0].trim() : 'Movie';
                    const iframe = document.getElementById('movie-iframe');
                    let embedUrl = "";

                    // Assign source
                    if (movie.source === "mega") {
                        embedUrl = movie.embedId.replace("/file/", "/embed/");
                        document.getElementById('mega-shield').style.display = "block";
                    } else if (movie.source === "ok.ru") {
                        embedUrl = `https://ok.ru/videoembed/${movie.embedId}`;
                    } else {
                        embedUrl = `https://rumble.com/embed/${movie.embedId}/?pub=4`;
                    }
                    iframe.src = embedUrl;

                    // Update Page
                    document.title = `${cleanTitle} (${movie.year || ''}) | MovieHub`;
                    document.getElementById('movie-title').innerText = cleanTitle;
                    document.getElementById('movie-meta').innerText = `${movie.year || 'N/A'} | ${movie.quality || 'HD'} | ${movie.genres || ''}`;
                    document.getElementById('movie-desc').innerText = movie.description;

                    // Inject VideoObject Schema for Google
                    const script = document.createElement('script');
                    script.type = 'application/ld+json';
                    script.textContent = JSON.stringify({
                        "@context": "https://schema.org",
                        "@type": "VideoObject",
                        "name": cleanTitle,
                        "description": movie.description,
                        "thumbnailUrl": movie.posterUrl,
                        "uploadDate": new Date().toISOString(),
                        "contentUrl": window.location.href,
                        "embedUrl": embedUrl,
                        "publisher": {
                            "@type": "Organization",
                            "name": "MovieHub",
                            "logo": { "@type": "ImageObject", "url": "https://moviehub.uk/logo.png" }
                        }
                    });
                    document.head.appendChild(script);
                }
            } catch (e) { console.error("Error loading movie:", e); }
        }
        loadMovieDetails();
    </script>
</body>
</html>
