<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title id="page-title">Movie Details | MovieHub</title>
    <script id="schema-script" type="application/ld+json"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header"><h2>Movie<span>Hub</span></h2></div>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> Home</a></li>
            <li><a href="catalog.html"><i class="fa-solid fa-film"></i> All Movies</a></li>
        </ul>
        
        <h3>Genres</h3>
        <ul id="genre-list">
            <li><a href="catalog.html?genre=Action">Action</a></li>
            <li><a href="catalog.html?genre=Thriller">Thriller</a></li>
            <li><a href="catalog.html?genre=Drama">Drama</a></li>
            <li><a href="catalog.html?genre=Hitchcock">Hitchcock</a></li>
            <li><a href="catalog.html?genre=Horror">Horror</a></li>
            <li><a href="catalog.html?genre=Sci-Fi">Sci-Fi</a></li>
            <li><a href="catalog.html?genre=Musical">Musical</a></li>
            <li><a href="catalog.html?genre=History">History</a></li>
        </ul>
    </nav>

    <main class="content">
        <div id="video-container" class="video-wrapper" style="width: 100%; aspect-ratio: 16 / 9; background: #000;"></div>
        
        <div class="movie-info-block" style="margin-top:20px; background:#1a1a1a; padding:20px; border-radius:8px;">
            <h1 id="movie-title">Loading...</h1>
            <p id="movie-meta" style="color:#e50914; font-weight:bold; margin:10px 0;"></p>
            <p id="movie-desc" style="line-height:1.6; color:#ccc;"></p>
        </div>
    </main>

    <script>
        async function initPlayer() {
            const params = new URLSearchParams(window.location.search);
            const movieId = params.get('id');
            if (!movieId) return;

            try {
                const response = await fetch('data/all-movies.json');
                const movies = await response.json();
                const movie = movies.find(m => m.id === movieId);

                if (movie) {
                    // Update Page Title
                    document.title = movie.title + " | MovieHub";
                    
                    // Update Body Content
                    document.getElementById('movie-title').innerText = movie.title;
                    const genreList = Array.isArray(movie.genres) ? movie.genres.join(', ') : movie.genres;
                    document.getElementById('movie-meta').innerText = `${movie.year} | ${movie.quality || 'HD'} | ${genreList}`;
                    document.getElementById('movie-desc').innerText = movie.description;

                    // Update Schema for Google
                    const schema = {
                        "@context": "https://schema.org",
                        "@type": "Movie",
                        "name": movie.title,
                        "description": movie.description,
                        "image": movie.posterUrl,
                        "director": { "@type": "Person", "name": movie.director || "N/A" }
                    };
                    document.getElementById('schema-script').innerText = JSON.stringify(schema);

                    // Handle Video Embed
                    const container = document.getElementById('video-container');
                    const src = movie.source === 'ok.ru' ? `https://ok.ru/videoembed/${movie.embedId}` : `https://rumble.com/embed/${movie.embedId}/?pub=4`;
                    container.innerHTML = `<iframe src="${src}" width="100%" height="100%" frameborder="0" allowfullscreen></iframe>`;
                } else {
                    document.getElementById('movie-title').innerText = "Movie Not Found.";
                }
            } catch (err) {
                console.error("Playback Error:", err);
                document.getElementById('movie-title').innerText = "Error loading movie.";
            }
        }
        window.onload = initPlayer;
    </script>
</body>
</html>
